<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXA · SPX500 H4 Indicator with Alerts</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #07090f; --panel: #0b0e1a; --border: #182040;
    --green: #00e676; --red: #ff1744; --gold: #ffd600;
    --blue: #00b8ff; --purple: #b040ff; --text: #dde8ff; --dim: #4a6a8a;
    --glow-green: 0 0 14px #00e676bb; --glow-red: 0 0 14px #ff1744bb;
    --glow-gold: 0 0 14px #ffd600bb; --glow-blue: 0 0 14px #00b8ffbb;
    --glow-purple: 0 0 14px #b040ffbb;
  }
  body {
    background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 14px; background-image: radial-gradient(ellipse at 50% 0%, #1a0a3a22 0%, transparent 70%);
  }
  .top-label {
    font-family: 'Orbitron', sans-serif; font-size: 0.65rem; letter-spacing: 0.45em;
    color: var(--dim); margin-bottom: 4px;
  }
  .buy-sell-title {
    display: flex; gap: 14px; align-items: center; font-family: 'Orbitron', sans-serif;
    font-size: clamp(2.8rem, 10vw, 5rem); font-weight: 900; line-height: 1; margin-bottom: 6px;
  }
  .buy-sell-title .buy  { color: var(--green); text-shadow: var(--glow-green); }
  .buy-sell-title .div  { color: var(--dim); font-size: 2.5rem; }
  .buy-sell-title .sell { color: var(--red); text-shadow: var(--glow-red); }
  .sub-label {
    font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; color: var(--purple);
    letter-spacing: 0.2em; margin-bottom: 12px; text-shadow: var(--glow-purple);
  }
  .notif-controls { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
  .notif-btn {
    padding: 6px 12px; border: 1px solid var(--border); border-radius: 4px; background: #0d1225;
    color: var(--text); font-family: 'Orbitron', sans-serif; font-size: 0.65rem; cursor: pointer;
    transition: all 0.2s;
  }
  .notif-btn:hover { opacity: 0.85; }
  .notif-btn.active { border-color: var(--green); background: #00e67622; }
  .conn-status {
    font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; padding: 4px 14px;
    border-radius: 20px; margin-bottom: 10px; display
